{% load i18n %}<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE|default:'en' }}">
<head>
<meta charset="UTF-8">
<title>{% trans "Court signs" %} – {{ tournament.name }}</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F3F8;</text></svg>">
<style>
  /* ── Screen header ── */
  body {
    font-family: Arial, Helvetica, sans-serif;
    background: #f4f7fb;
    margin: 0;
    padding: 1.5rem;
    color: #111;
  }
  .screen-header {
    max-width: 700px;
    margin: 0 auto 1.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .screen-header h1 { margin: 0; font-size: 1.4rem; flex: 1; }
  .btn {
    display: inline-block;
    padding: 0.5rem 1.2rem;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-size: 0.95rem;
    text-decoration: none;
    color: #fff;
  }
  .btn-primary { background: #16692c; }
  .btn-secondary { background: #16692c; }

  /* ── Signs container (screen preview) ── */
  .signs-container {
    display: flex;
    flex-direction: column;
    gap: 2rem;
    max-width: 700px;
    margin: 0 auto;
  }

  /* ── Single sign ── */
  .court-sign {
    background: #fff;
    border: 3px solid #1a1a2e;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2.5rem 3rem;
    gap: 0.6rem;
    box-shadow: 0 4px 18px rgba(0,0,0,0.12);
    page-break-after: always;
    break-after: page;
  }
  .court-sign:last-child {
    page-break-after: avoid;
    break-after: avoid;
  }

  .sign-logo {
    max-height: 100px;
    max-width: 220px;
    object-fit: contain;
    margin-bottom: 0.5rem;
  }

  .sign-tournament-name {
    font-size: 1.3rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: #333;
    text-align: center;
    text-transform: uppercase;
  }

  .sign-label {
    font-size: 2.2rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    color: #555;
    text-transform: uppercase;
    margin-top: 0.5rem;
  }

  .sign-number {
    font-size: 22rem;
    font-weight: 900;
    line-height: 1;
    color: #1a1a2e;
    letter-spacing: -0.04em;
  }

  .sign-divider {
    width: 80%;
    height: 4px;
    background: #1a1a2e;
    border-radius: 2px;
    margin: 0.4rem 0;
  }

  /* ── Print ── */
  @media print {
    @page {
      size: A3 landscape;
      margin: 15mm 20mm;
    }

    body {
      background: #fff;
      padding: 0;
    }

    .screen-header { display: none; }

    .signs-container {
      gap: 0;
      max-width: none;
    }

    .court-sign {
      border-radius: 0;
      box-shadow: none;
      border: 4px solid #000;
      /* Fill the full A3 page */
      width: 100%;
      height: calc(100vh - 30mm);
      box-sizing: border-box;
      padding: 15mm 20mm;
      gap: 4mm;
    }

    .sign-logo {
      max-height: 35mm;
      max-width: 80mm;
    }

    .sign-tournament-name {
      font-size: 14pt;
    }

    .sign-label {
      font-size: 28pt;
      letter-spacing: 0.2em;
    }

    .sign-number {
      font-size: 340pt;
      line-height: 0.9;
    }

    .sign-divider {
      height: 3pt;
    }
  }
</style>
</head>
<body>

<!-- Screen header -->
<div class="screen-header">
  <h1>🏸 {% trans "Court signs" %} – {{ tournament.name }}</h1>
  <button class="btn btn-primary" onclick="window.print()">🖨️ {% trans "Print" %}</button>
  <a href="{% url 'tournament_detail' tournament.pk %}" class="btn btn-secondary">← {% trans "Back" %}</a>
</div>

<div class="signs-container">
  {% for court in courts %}
  <div class="court-sign">
    {% if tournament.logo %}
    <img src="{{ tournament.logo.url }}" alt="{{ tournament.name }} logo" class="sign-logo">
    {% endif %}
    <div class="sign-tournament-name">{{ tournament.name }}</div>
    <div class="sign-divider"></div>
    <div class="sign-label">{% trans "Court" %}</div>
    <div class="sign-number">{{ court }}</div>
  </div>
  {% endfor %}
</div>

</body>
</html>
