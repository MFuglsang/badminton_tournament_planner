server {
    listen 80;
    server_tokens off;          # don't leak nginx version in error pages / Server header
    client_max_body_size 20M;

    # ── Site-wide security headers ───────────────────────────────────────────
    # These complement (and override) the ones Django emits, ensuring even
    # responses that bypass Django (static / media) carry them.
    add_header X-Content-Type-Options nosniff             always;
    add_header X-Frame-Options        DENY                always;
    add_header Referrer-Policy        same-origin         always;
    add_header Cross-Origin-Opener-Policy same-origin     always;

    location /static/ {
        alias /static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        # Re-assert nosniff on this location (add_header replaces parent ones).
        add_header X-Content-Type-Options nosniff always;
    }

    location /media/ {
        alias /media/;
        # Force browser to download user-uploaded files instead of rendering
        # them in-place. Combined with the upload-format whitelist in the
        # TournamentForm, this is defence-in-depth against stored XSS through
        # uploaded SVG/HTML disguised as an image.
        add_header X-Content-Type-Options nosniff always;
        add_header Content-Disposition    "attachment" always;
        add_header Content-Security-Policy "default-src 'none'; img-src 'self'; style-src 'unsafe-inline'" always;
    }

    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
