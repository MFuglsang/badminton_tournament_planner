{% load static %}{% load i18n %}<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Badminton Tournament Planner{% endblock %}</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F3F8;</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            background: #eef1f6;
            color: #1e293b;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            font-size: 15px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: #0d4f22;
            color: white;
            padding: 0 2rem;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header-brand { display: flex; align-items: center; gap: 0.6rem; font-size: 1.05rem; font-weight: 700; }
        .header-brand a { color: white; text-decoration: none; display: flex; align-items: center; gap: 0.5rem; }
        .logo-icon { background: rgba(255,255,255,0.15); border-radius: 8px; width: 34px; height: 34px; display:flex; align-items:center; justify-content:center; font-size: 1.1rem; }
        .container { max-width: 1220px; margin: 0 auto; padding: 2rem 1.5rem; flex: 1; width: 100%; }
        h1 { font-size: 1.65rem; font-weight: 700; color: #0d4f22; margin: 0 0 0.2rem; }
        .card { background: white; border-radius: 12px; padding: 1.5rem; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 0.35rem;
            padding: 0.48rem 1.05rem; border-radius: 7px;
            font-size: 0.83rem; font-weight: 600; cursor: pointer;
            border: 1.5px solid transparent; text-decoration: none;
            transition: background 0.13s ease, border-color 0.13s ease, transform 0.13s ease, box-shadow 0.13s ease;
            line-height: 1.4; white-space: nowrap;
            font-family: inherit;
        }
        .btn:hover { text-decoration: none; transform: translateY(-1px); }
        .btn:active { transform: translateY(0); box-shadow: none !important; }
        .btn-primary {
            background: #16692c; color: white; border-color: #16692c;
            box-shadow: 0 1px 4px rgba(22,105,44,0.28), inset 0 1px 0 rgba(255,255,255,0.1);
        }
        .btn-primary:hover {
            background: #125824; border-color: #125824; color: white;
            box-shadow: 0 4px 12px rgba(22,105,44,0.32);
        }
        label { display: block; font-weight: 600; font-size: 0.875rem; margin-bottom: 0.3rem; }
        input[type=text], input[type=password] {
            width: 100%; padding: 0.55rem 0.75rem;
            border: 1.5px solid #cbd5e1; border-radius: 6px;
            font-size: 0.95rem; margin-bottom: 1rem; box-sizing: border-box;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <header>
        <div class="header-brand">
            <div class="logo-icon">🏸</div>
            <a href="/">Badminton Tournament Planner</a>
        </div>
        {# Language switcher #}
        <form action="{% url 'set_language' %}" method="post" style="display:inline; margin:0;">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ request.path }}">
            <select name="language" onchange="this.form.submit()"
                style="background:#fff; border:1px solid rgba(255,255,255,0.4); color:#1a1a1a; font-size:0.8rem; padding:0.3rem 0.5rem; border-radius:6px; cursor:pointer; font-family:inherit;">
                {% get_current_language as CURRENT_LANG %}
                {% get_available_languages as LANGUAGES %}
                {% for lang_code, lang_name in LANGUAGES %}
                <option value="{{ lang_code }}"{% if lang_code == CURRENT_LANG %} selected{% endif %}>{{ lang_name }}</option>
                {% endfor %}
            </select>
        </form>
    </header>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
