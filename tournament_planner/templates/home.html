<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badminton Tournament Planner</title>
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #F5F5F5;
            color: #333333;
        }
        header {
            background-color: #005BAC;
            color: white;
            padding: 1rem 0;
            text-align: center;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }
        .container {
            max-width: 1200px;
            margin: 5rem auto 0;
            padding: 1rem;
            text-align: center;
        }
        a {
            color: #005BAC;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        .button {
            display: inline-block;
            background-color: #005BAC;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            text-decoration: none;
            margin: 1rem 0;
        }
        .button:hover {
            background-color: #FF6600;
        }
        footer {
            background-color: #F5F5F5;
            color: #333333;
            padding: 1rem 0;
            text-align: center;
            margin-top: 2rem;
            border-top: 1px solid #E0E0E0;
        }
    </style>
</head>
<body>
    <header>
        <h1>Badminton Tournament Planner</h1>
    </header>
    <div class="container">
        <p>Welcome to the Badminton Tournament Planner! Plan and manage your tournaments with ease.</p>
        <a href="/admin/" class="button">Go to Admin Panel</a>
    </div>
    <footer>
        <p>&copy; 2026 Badminton Tournament Planner. All rights reserved.</p>
    </footer>
</body>
</html>
