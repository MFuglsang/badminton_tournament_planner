services:

  # ─── Required environment variables (set in .env) ────────────────────────────
  # SECRET_KEY          – Django secret key (generate with: python -c "import secrets; print(secrets.token_urlsafe(50))")
  # POSTGRES_PASSWORD   – PostgreSQL password (required, no default)
  # ─────────────────────────────────────────────────────────────────────────────

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-badminton}
      POSTGRES_USER: ${POSTGRES_USER:-badminton}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-badminton}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  web:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DEBUG: "False"
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      # Club tier player limits — clubs needing more than large should contact us for a custom plan
      CLUB_TIER_LIMIT_SMALL: "30"
      CLUB_TIER_LIMIT_MEDIUM: "80"
      CLUB_TIER_LIMIT_LARGE: "150"
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; urllib.request.urlopen('http://localhost:8000/login/', timeout=3); sys.exit(0)\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - internal

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - -c
      - |
        export NGINX_RESOLVER=$$(awk '/^nameserver/{print $$2;exit}' /etc/resolv.conf)
        exec /docker-entrypoint.sh nginx -g 'daemon off;'
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/templates/default.conf.template:ro
      - static_data:/static:ro
      - media_data:/media:ro
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - internal

  # ─── Daily backup of database + media to ./backups/ on the host ──────────────
  # Optional off-site sync: set S3_BUCKET (and AWS_* / S3_ENDPOINT) in .env
  # to additionally upload each archive to an S3-compatible bucket.
  backup:
    build: ./backup
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      TZ: ${TZ:-Europe/Copenhagen}
      BACKUP_HOUR: ${BACKUP_HOUR:-2}
      BACKUP_RETENTION_DAILY: ${BACKUP_RETENTION_DAILY:-14}
      BACKUP_RETENTION_MONTHLY: ${BACKUP_RETENTION_MONTHLY:-12}
      BACKUP_ON_START: ${BACKUP_ON_START:-0}
    volumes:
      - media_data:/media:ro
      - ${BACKUP_DIR:-./backups}:/backups
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

volumes:
  postgres_data:
  media_data:
  static_data:

networks:
  internal:
