services:

  # ─── Required environment variables (set in .env) ────────────────────────────
  # SECRET_KEY          – Django secret key (generate with: python -c "import secrets; print(secrets.token_urlsafe(50))")
  # POSTGRES_PASSWORD   – PostgreSQL password (required, no default)
  # ─────────────────────────────────────────────────────────────────────────────

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-badminton}
      POSTGRES_USER: ${POSTGRES_USER:-badminton}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-badminton}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  web:
    build: .
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "False"
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost}
      POSTGRES_DB: ${POSTGRES_DB:-badminton}
      POSTGRES_USER: ${POSTGRES_USER:-badminton}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/static:ro
      - media_data:/media:ro
    depends_on:
      - web
    networks:
      - internal

volumes:
  postgres_data:
  media_data:
  static_data:

networks:
  internal:
